# Living Brain Configuration
# Copy this file to config.yaml and customize for your use

# Your name as it appears in chat exports
persona_name: "Your Name"

# Directory for all data storage
data_dir: "./data"

# Model configuration
model:
  # Base model to use (Unsloth format or HuggingFace path)
  # Options: llama-3.2-1b, llama-3.2-3b, llama-3.1-8b, qwen-2.5-3b, qwen-2.5-7b
  base_model: "unsloth/Llama-3.2-3B-Instruct"

  # Embedding model for memory retrieval
  embedding_model: "sentence-transformers/all-MiniLM-L6-v2"

  # Maximum sequence length
  max_seq_length: 4096

  # Use 4-bit quantization (recommended for memory efficiency)
  load_in_4bit: true

  # LoRA configuration
  lora_r: 32
  lora_alpha: 16
  lora_dropout: 0.05

# Memory system configuration
memory:
  # Directory for ChromaDB persistence
  chroma_persist_dir: "./data/chroma"

  # Collection name for conversations
  collection_name: "conversations"

  # Chunk size for splitting conversations
  chunk_size: 512
  chunk_overlap: 50

  # Number of memories to retrieve
  top_k_retrieval: 5

  # Maximum retrieved context injected into a prompt
  max_context_chars: 12000

  # Maximum active facts injected into a prompt
  max_facts: 50

# Fact store configuration
facts:
  # Path to store facts
  facts_path: "./data/facts.json"

  # Automatically extract facts from conversations
  auto_extract: true

  # Use LLM for more accurate fact extraction (slower)
  llm_extraction: false

# Training configuration
training:
  # Output directory for trained adapters
  output_dir: "./models/lora_adapter"

  # Training hyperparameters
  num_epochs: 3
  batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 0.0002  # 2e-4
  warmup_ratio: 0.1
  max_grad_norm: 1.0

  # Checkpointing
  save_steps: 100
  logging_steps: 10

# Inference configuration
inference:
  # Generation parameters
  temperature: 0.7
  top_p: 0.9
  top_k: 50
  max_new_tokens: 512
  repetition_penalty: 1.1

  # Use GGUF model instead of transformers (faster on CPU)
  use_gguf: false
  gguf_path: null  # Path to GGUF file if use_gguf is true
